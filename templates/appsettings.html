<!-- templates/appsettings.html : Simple clean settings, no A4 -->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>ตั้งค่า</title>
  <style>
    :root{
      --teal:#0f766e; --teal2:#0d9488;
      --bg:#f6fbfa; --card:#fff; --text:#0f172a; --muted:#64748b;
      --line:#e2e8f0; --soft:#f8fafc; --danger:#dc2626;
      --shadow:0 8px 22px rgba(2,8,23,.06);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:10px 10px 120px;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans Thai',sans-serif;
      font-size:12px;
    }
    input,select,button{font:inherit;font-size:12px}
    .wrap{max-width:980px;margin:0 auto}
    .topbar{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .title{font-size:16px;font-weight:900;color:#064e3b;margin:0}
    .hint{color:var(--muted);font-size:11px;margin-top:2px}
    .tabs{
      position:sticky;
      top:8px;
      z-index:20;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:8px 0;
      background:rgba(246,251,250,.92);
      backdrop-filter:blur(8px);
    }
    .tabBtn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:9px 13px;
      font-weight:900;
      cursor:pointer;
      color:#0f172a;
    }
    .tabBtn.active{background:var(--teal);border-color:var(--teal);color:#fff}
    .panel{display:none}
    .panel.active{display:block}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      margin-bottom:10px;
      overflow:hidden;
    }
    .cardHd{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      background:#fbfffe;
    }
    .cardTitle{font-weight:900;color:#064e3b;font-size:13px}
    .cardBody{padding:10px 12px}
    .btn{
      border:none;
      border-radius:12px;
      padding:9px 11px;
      font-weight:900;
      cursor:pointer;
      background:#e2e8f0;
      color:#0f172a;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      white-space:nowrap;
    }
    .btn.primary{background:var(--teal);color:#fff}
    .btn.ghost{background:#fff;border:1px solid var(--line);color:#0f172a}
    .btn.danger{background:#fee2e2;color:#991b1b}
    .btn.ok{background:#dcfce7;color:#166534}
    .btn.small{padding:7px 9px;border-radius:10px}
    .ipt{
      width:100%;
      border:1px solid #cbd5e1;
      background:#fff;
      border-radius:12px;
      padding:9px 10px;
      outline:none;
      min-width:0;
    }
    .ipt:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
    label{display:block;font-weight:800;color:#475569;margin:0 0 5px;font-size:11px}
    .filters{display:grid;grid-template-columns:1fr 160px 130px auto;gap:8px;align-items:end}
    .filters.cat{grid-template-columns:1fr 130px auto}
    @media(max-width:720px){.filters,.filters.cat{grid-template-columns:1fr}.topbar{align-items:flex-start}.topbar .btn{margin-top:6px}}
    .list{display:grid;gap:8px}
    .groupTitle{
      margin:12px 2px 6px;
      color:#064e3b;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .countPill{background:#ecfdf5;border:1px solid #bbf7d0;color:#047857;border-radius:999px;padding:3px 8px;font-weight:900;font-size:11px}
    .row{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      align-items:center;
    }
    .row:hover{border-color:#a7f3d0;box-shadow:0 6px 18px rgba(2,8,23,.05)}
    .name{font-weight:900;color:#0f172a;line-height:1.25;word-break:break-word}
    .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;color:var(--muted);font-size:11px}
    .chip{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:3px 7px;white-space:nowrap}
    .chip.on{background:#ecfdf5;color:#047857;border-color:#bbf7d0;font-weight:900}
    .chip.off{background:#fef2f2;color:#b91c1c;border-color:#fecaca;font-weight:900}
    .rowActions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    @media(max-width:520px){.row{grid-template-columns:1fr}.rowActions{justify-content:flex-start}}
    .empty{padding:16px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px;background:#fff}
    .drawerBackdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:80}
    .drawerBackdrop.show{display:block}
    .drawer{
      position:fixed;right:0;top:0;height:100%;width:min(420px,94vw);
      background:#fff;z-index:90;transform:translateX(104%);transition:.18s ease;
      box-shadow:-18px 0 48px rgba(2,8,23,.22);display:flex;flex-direction:column;
    }
    .drawer.open{transform:translateX(0)}
    .drawerHd{padding:13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:flex-start;background:#fbfffe}
    .drawerTitle{font-weight:900;color:#064e3b;font-size:14px}
    .drawerSub{color:var(--muted);font-size:11px;margin-top:2px}
    .drawerBody{padding:13px;display:grid;gap:10px;overflow:auto}
    .drawerFt{padding:13px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;background:#fff}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:520px){.grid2{grid-template-columns:1fr}}
    .miniNote{background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:9px 10px;color:#475569;line-height:1.35}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 12px;border-radius:13px;box-shadow:0 14px 34px rgba(2,8,23,.22);z-index:120;display:none;font-weight:800;max-width:92vw;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">ตั้งค่า</h1>
        <div class="hint">จัดสินค้า หมวด ราคา และราคาประเมิน</div>
      </div>
      <button class="btn primary" id="topAddBtn" type="button">+ เพิ่ม</button>
    </div>

    <div class="tabs">
      <button class="tabBtn active" type="button" data-tab="products">สินค้า</button>
      <button class="tabBtn" type="button" data-tab="categories">หมวด</button>
      <button class="tabBtn" type="button" data-tab="trash">ถังขยะ</button>
    </div>

    <section class="panel active" id="panel-products">
      <div class="card">
        <div class="cardHd">
          <div class="cardTitle">สินค้า</div>
          <button class="btn primary small" id="btnAddProduct" type="button">+ สินค้า</button>
        </div>
        <div class="cardBody">
          <div class="filters">
            <div><label>ค้นหา</label><input class="ipt" id="prodSearch" placeholder="ชื่อสินค้า"></div>
            <div><label>หมวด</label><select class="ipt" id="prodFilterCat"><option value="all">ทั้งหมด</option></select></div>
            <div><label>สถานะ</label><select class="ipt" id="prodFilterActive"><option value="all">ทั้งหมด</option><option value="true">ใช้งาน</option><option value="false">ปิด</option></select></div>
            <div><button class="btn ghost" type="button" id="btnClearProductFilter">ล้าง</button></div>
          </div>
        </div>
      </div>
      <div class="list" id="productsList"></div>
    </section>

    <section class="panel" id="panel-categories">
      <div class="card">
        <div class="cardHd">
          <div class="cardTitle">หมวดสินค้า</div>
          <button class="btn primary small" id="btnAddCategory" type="button">+ หมวด</button>
        </div>
        <div class="cardBody">
          <div class="filters cat">
            <div><label>ค้นหา</label><input class="ipt" id="catSearch" placeholder="ชื่อหมวด"></div>
            <div><label>สถานะ</label><select class="ipt" id="catFilterActive"><option value="all">ทั้งหมด</option><option value="true">ใช้งาน</option><option value="false">ปิด</option></select></div>
            <div><button class="btn ghost" type="button" id="btnClearCatFilter">ล้าง</button></div>
          </div>
        </div>
      </div>
      <div class="list" id="catsList"></div>
    </section>

    <section class="panel" id="panel-trash">
      <div class="card">
        <div class="cardHd"><div class="cardTitle">ถังขยะ</div></div>
        <div class="cardBody">
          <div class="filters cat">
            <div><label>ค้นหา</label><input class="ipt" id="trashSearch" placeholder="ชื่อสินค้า / หมวด"></div>
            <div></div>
            <div><button class="btn ghost" type="button" id="btnClearTrashFilter">ล้าง</button></div>
          </div>
        </div>
      </div>
      <div class="list" id="trashList"></div>
    </section>
  </div>

  <div id="drawerBackdrop" class="drawerBackdrop"></div>
  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawerHd">
      <div>
        <div class="drawerTitle" id="drawerTitle">แก้ไข</div>
        <div class="drawerSub" id="drawerSub">กรอกเฉพาะที่จำเป็น</div>
      </div>
      <button class="btn ghost small" type="button" id="btnCloseDrawer">ปิด</button>
    </div>
    <div class="drawerBody" id="drawerBody"></div>
    <div class="drawerFt" id="drawerFooter"></div>
  </aside>

  <div id="toast" class="toast"></div>
  {% include 'floating_menu.html' %}

<script>
const $ = (id) => document.getElementById(id);
let categories = [];
let products = [];
let activeTab = 'products';
let drawerState = { type:null, mode:null, data:null };

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(()=>{ t.style.display='none'; }, 1500);
}

function escapeHtml(v){
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function num(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function money(v){
  if(v === null || v === undefined || v === '') return '-';
  const n = Number(v);
  if(!Number.isFinite(n)) return '-';
  return Math.round(n).toLocaleString();
}

async function api(url, method='GET', body=null){
  const opts = { method, headers:{} };
  if(body){
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(url, opts);
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || data.message || ('HTTP '+res.status));
  return data;
}

function categoryById(id){
  return categories.find(c => String(c.id) === String(id)) || null;
}
function catNameById(id){
  return categoryById(id)?.name || '-';
}
function sortedCats(){
  return categories.slice().sort((a,b)=> (num(a.sort_order)-num(b.sort_order)) || String(a.name||'').localeCompare(String(b.name||''),'th'));
}
function sortedProducts(rows){
  return rows.slice().sort((a,b)=>{
    const ca = catNameById(a.category_id), cb = catNameById(b.category_id);
    return ca.localeCompare(cb,'th') || (num(a.sort_order)-num(b.sort_order)) || String(a.name||'').localeCompare(String(b.name||''),'th');
  });
}

function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tabBtn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  $(`panel-${tab}`).classList.add('active');
  $('topAddBtn').textContent = tab === 'categories' ? '+ เพิ่มหมวด' : '+ เพิ่มสินค้า';
  $('topAddBtn').style.visibility = tab === 'trash' ? 'hidden' : 'visible';
}

document.querySelectorAll('.tabBtn').forEach(btn => btn.addEventListener('click', ()=>setTab(btn.dataset.tab)));
$('topAddBtn').addEventListener('click', ()=> activeTab === 'categories' ? openCategoryDrawer('add') : openProductDrawer('add'));

function renderCategoryOptions(){
  const current = $('prodFilterCat').value || 'all';
  $('prodFilterCat').innerHTML = '<option value="all">ทั้งหมด</option>' + sortedCats().map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join('');
  $('prodFilterCat').value = [...$('prodFilterCat').options].some(o=>o.value===current) ? current : 'all';
}

function productRow(p){
  const active = !!p.is_active;
  const estUnit = p.estimated_unit || 'ชิ้น';
  const deleted = !!p.deleted_at;
  return `
    <div class="row">
      <div>
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="meta">
          <span class="chip">${escapeHtml(catNameById(p.category_id))}</span>
          <span class="chip">ราคาตั้งต้น ${escapeHtml(money(p.default_price))}</span>
          <span class="chip">ประเมิน ${escapeHtml(money(p.estimated_price))}/${escapeHtml(estUnit)}</span>
          <span class="chip">ลำดับ ${escapeHtml(p.sort_order ?? 0)}</span>
          <span class="chip ${active ? 'on' : 'off'}">${active ? 'ใช้งาน' : 'ปิด'}</span>
        </div>
      </div>
      <div class="rowActions">
        ${deleted ? `<button class="btn ok small" type="button" onclick="restoreProduct('${escapeHtml(p.id)}')">กู้คืน</button>` : `
          <button class="btn ghost small" type="button" onclick="openProductDrawer('edit','${escapeHtml(p.id)}')">แก้ไข</button>
          <button class="btn danger small" type="button" onclick="trashProduct('${escapeHtml(p.id)}')">ลบ</button>
        `}
      </div>
    </div>`;
}

function renderProducts(){
  const q = ($('prodSearch').value || '').trim().toLowerCase();
  const cat = $('prodFilterCat').value || 'all';
  const f = $('prodFilterActive').value || 'all';
  const rows = sortedProducts(products.filter(p => !p.deleted_at).filter(p => {
    if(q && !String(p.name||'').toLowerCase().includes(q)) return false;
    if(cat !== 'all' && String(p.category_id) !== String(cat)) return false;
    if(f === 'true' && !p.is_active) return false;
    if(f === 'false' && p.is_active) return false;
    return true;
  }));
  const box = $('productsList');
  if(!rows.length){ box.innerHTML = '<div class="empty">ไม่พบสินค้า</div>'; return; }

  const byCat = new Map();
  for(const p of rows){
    const cn = catNameById(p.category_id);
    if(!byCat.has(cn)) byCat.set(cn, []);
    byCat.get(cn).push(p);
  }
  box.innerHTML = [...byCat.entries()].map(([cn, list]) => `
    <div class="groupTitle"><span>${escapeHtml(cn)}</span><span class="countPill">${list.length} รายการ</span></div>
    ${list.map(productRow).join('')}
  `).join('');
}

function catRow(c){
  const active = !!c.is_active;
  const count = products.filter(p => !p.deleted_at && String(p.category_id) === String(c.id)).length;
  return `
    <div class="row">
      <div>
        <div class="name">${escapeHtml(c.name)}</div>
        <div class="meta">
          <span class="chip">${count} สินค้า</span>
          <span class="chip">ลำดับ ${escapeHtml(c.sort_order ?? 0)}</span>
          <span class="chip ${active ? 'on' : 'off'}">${active ? 'ใช้งาน' : 'ปิด'}</span>
        </div>
      </div>
      <div class="rowActions">
        <button class="btn ghost small" type="button" onclick="openCategoryDrawer('edit','${escapeHtml(c.id)}')">แก้ไข</button>
      </div>
    </div>`;
}

function renderCats(){
  const q = ($('catSearch').value || '').trim().toLowerCase();
  const f = $('catFilterActive').value || 'all';
  const rows = sortedCats().filter(c => {
    if(q && !String(c.name||'').toLowerCase().includes(q)) return false;
    if(f === 'true' && !c.is_active) return false;
    if(f === 'false' && c.is_active) return false;
    return true;
  });
  $('catsList').innerHTML = rows.length ? rows.map(catRow).join('') : '<div class="empty">ไม่พบหมวด</div>';
}

function renderTrash(){
  const q = ($('trashSearch').value || '').trim().toLowerCase();
  const rows = sortedProducts(products.filter(p => !!p.deleted_at).filter(p => {
    if(!q) return true;
    const hay = `${p.name||''} ${catNameById(p.category_id)}`.toLowerCase();
    return hay.includes(q);
  }));
  $('trashList').innerHTML = rows.length ? rows.map(productRow).join('') : '<div class="empty">ถังขยะว่าง</div>';
}

function renderAll(){
  renderCategoryOptions();
  renderProducts();
  renderCats();
  renderTrash();
}

async function loadAll(){
  categories = await api('/api/categories');
  products = await api('/api/products');
  renderAll();
}

function openDrawer(title, sub, bodyHtml, footerButtons){
  $('drawerTitle').textContent = title;
  $('drawerSub').textContent = sub || '';
  $('drawerBody').innerHTML = bodyHtml;
  $('drawerFooter').innerHTML = '';
  footerButtons.forEach(btn => $('drawerFooter').appendChild(btn));
  $('drawerBackdrop').classList.add('show');
  $('drawer').classList.add('open');
  $('drawer').setAttribute('aria-hidden','false');
}
function closeDrawer(){
  $('drawerBackdrop').classList.remove('show');
  $('drawer').classList.remove('open');
  $('drawer').setAttribute('aria-hidden','true');
  drawerState = {type:null, mode:null, data:null};
}
$('drawerBackdrop').onclick = closeDrawer;
$('btnCloseDrawer').onclick = closeDrawer;
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDrawer(); });

function makeBtn(text, cls, fn){
  const b = document.createElement('button');
  b.className = `btn ${cls || ''}`;
  b.type = 'button';
  b.textContent = text;
  b.onclick = fn;
  return b;
}

function categoryOptions(selected){
  return sortedCats().map(c => `<option value="${escapeHtml(c.id)}" ${String(c.id)===String(selected)?'selected':''}>${escapeHtml(c.name)}${c.is_active?'':' (ปิด)'}</option>`).join('');
}

function openProductDrawer(mode, id=null){
  const data = id ? products.find(p => String(p.id) === String(id)) : null;
  const p = data || { name:'', category_id: sortedCats()[0]?.id || '', default_price:'', estimated_price:'', estimated_unit:'ชิ้น', sort_order:0, is_active:true };
  drawerState = { type:'product', mode, data:p };
  const body = `
    <div><label>ชื่อสินค้า</label><input class="ipt" id="d_prod_name" value="${escapeHtml(p.name)}" placeholder="ชื่อสินค้า"></div>
    <div><label>หมวด</label><select class="ipt" id="d_prod_cat">${categoryOptions(p.category_id)}</select></div>
    <div class="grid2">
      <div><label>ราคาตั้งต้น</label><input class="ipt" id="d_prod_default" type="number" step="0.01" value="${escapeHtml(p.default_price ?? '')}" placeholder="0"></div>
      <div><label>ราคาประเมิน</label><input class="ipt" id="d_prod_est" type="number" step="0.01" value="${escapeHtml(p.estimated_price ?? '')}" placeholder="0"></div>
    </div>
    <div class="grid2">
      <div><label>หน่วยประเมิน</label><input class="ipt" id="d_prod_unit" value="${escapeHtml(p.estimated_unit || 'ชิ้น')}" placeholder="ชิ้น / cc / ครั้ง"></div>
      <div><label>ลำดับ</label><input class="ipt" id="d_prod_sort" type="number" value="${escapeHtml(p.sort_order ?? 0)}"></div>
    </div>
    <div><label>สถานะ</label><select class="ipt" id="d_prod_active"><option value="true" ${p.is_active?'selected':''}>ใช้งาน</option><option value="false" ${!p.is_active?'selected':''}>ปิด</option></select></div>
    <div class="miniNote">ราคาประเมินใช้เฉพาะหน้าวิเคราะห์สินค้า ไม่กระทบยอดเงินจริงในบิล</div>
  `;
  const buttons = [
    makeBtn('ปิด','ghost',closeDrawer),
    makeBtn('บันทึก','primary',saveProductFromDrawer),
  ];
  openDrawer(mode === 'add' ? 'เพิ่มสินค้า' : 'แก้ไขสินค้า', 'แก้ทีละรายการ ไม่รกหน้าจอ', body, buttons);
}

async function saveProductFromDrawer(){
  const mode = drawerState.mode;
  const old = drawerState.data || {};
  const payload = {
    category_id: $('d_prod_cat').value,
    name: $('d_prod_name').value.trim(),
    default_price: $('d_prod_default').value,
    estimated_price: $('d_prod_est').value,
    estimated_unit: $('d_prod_unit').value.trim() || 'ชิ้น',
    sort_order: parseInt($('d_prod_sort').value || '0', 10),
    is_active: $('d_prod_active').value === 'true'
  };
  if(!payload.category_id) return toast('เลือกหมวดก่อน');
  if(!payload.name) return toast('กรอกชื่อสินค้า');
  try{
    const res = (mode === 'add')
      ? await api('/api/products','POST',payload)
      : await api('/api/products','PUT',{...payload, id: old.id});

    closeDrawer();
    await loadAll();

    const expectedEst = Number(payload.estimated_price || 0);
    let saved = null;
    if(res && res.row && res.row.id){
      saved = products.find(p => String(p.id) === String(res.row.id));
    }
    if(!saved && mode !== 'add' && old.id){
      saved = products.find(p => String(p.id) === String(old.id));
    }
    if(!saved){
      saved = products.find(p => String(p.category_id) === String(payload.category_id) && String(p.name || '').trim() === payload.name);
    }

    const actualEst = Number(saved?.estimated_price || 0);
    const hasEstimatedField = saved && Object.prototype.hasOwnProperty.call(saved, 'estimated_price');
    if(!hasEstimatedField || Math.abs(actualEst - expectedEst) > 0.0001){
      toast('บันทึกสินค้าแล้ว แต่ราคาประเมินยังไม่เข้า Supabase: เช็ก app.py และ SQL');
      return;
    }

    toast('บันทึกแล้ว');
  }catch(e){ toast('บันทึกไม่สำเร็จ: '+e.message); }
}

function openCategoryDrawer(mode, id=null){
  const data = id ? categories.find(c => String(c.id) === String(id)) : null;
  const c = data || { name:'', sort_order:0, is_active:true };
  drawerState = { type:'category', mode, data:c };
  const body = `
    <div><label>ชื่อหมวด</label><input class="ipt" id="d_cat_name" value="${escapeHtml(c.name)}" placeholder="ชื่อหมวด"></div>
    <div class="grid2">
      <div><label>ลำดับ</label><input class="ipt" id="d_cat_sort" type="number" value="${escapeHtml(c.sort_order ?? 0)}"></div>
      <div><label>สถานะ</label><select class="ipt" id="d_cat_active"><option value="true" ${c.is_active?'selected':''}>ใช้งาน</option><option value="false" ${!c.is_active?'selected':''}>ปิด</option></select></div>
    </div>
  `;
  openDrawer(mode === 'add' ? 'เพิ่มหมวด' : 'แก้ไขหมวด', 'หมวดใช้จัดกลุ่มสินค้า', body, [
    makeBtn('ปิด','ghost',closeDrawer),
    makeBtn('บันทึก','primary',saveCategoryFromDrawer),
  ]);
}

async function saveCategoryFromDrawer(){
  const mode = drawerState.mode;
  const old = drawerState.data || {};
  const payload = {
    name: $('d_cat_name').value.trim(),
    sort_order: parseInt($('d_cat_sort').value || '0', 10),
    is_active: $('d_cat_active').value === 'true'
  };
  if(!payload.name) return toast('กรอกชื่อหมวด');
  try{
    if(mode === 'add') await api('/api/categories','POST',payload);
    else await api('/api/categories','PUT',{...payload, id: old.id});
    toast('บันทึกแล้ว');
    closeDrawer();
    await loadAll();
  }catch(e){ toast('บันทึกไม่สำเร็จ: '+e.message); }
}

async function trashProduct(id){
  if(!confirm('ย้ายสินค้านี้ไปถังขยะใช่ไหม?')) return;
  try{
    await api('/api/products','DELETE',{id});
    toast('ย้ายไปถังขยะแล้ว');
    await loadAll();
  }catch(e){ toast('ลบไม่สำเร็จ: '+e.message); }
}
async function restoreProduct(id){
  try{
    await api('/api/products_restore','POST',{id});
    toast('กู้คืนแล้ว');
    await loadAll();
  }catch(e){ toast('กู้คืนไม่สำเร็จ: '+e.message); }
}

window.openProductDrawer = openProductDrawer;
window.openCategoryDrawer = openCategoryDrawer;
window.trashProduct = trashProduct;
window.restoreProduct = restoreProduct;

$('btnAddProduct').onclick = ()=>openProductDrawer('add');
$('btnAddCategory').onclick = ()=>openCategoryDrawer('add');
['prodSearch','prodFilterCat','prodFilterActive'].forEach(id => $(id).addEventListener('input', renderProducts));
$('prodFilterCat').addEventListener('change', renderProducts);
$('prodFilterActive').addEventListener('change', renderProducts);
$('btnClearProductFilter').onclick = ()=>{ $('prodSearch').value=''; $('prodFilterCat').value='all'; $('prodFilterActive').value='all'; renderProducts(); };

['catSearch','catFilterActive'].forEach(id => $(id).addEventListener('input', renderCats));
$('catFilterActive').addEventListener('change', renderCats);
$('btnClearCatFilter').onclick = ()=>{ $('catSearch').value=''; $('catFilterActive').value='all'; renderCats(); };

$('trashSearch').addEventListener('input', renderTrash);
$('btnClearTrashFilter').onclick = ()=>{ $('trashSearch').value=''; renderTrash(); };

loadAll().then(()=>toast('โหลดข้อมูลแล้ว')).catch(e=>{ console.error(e); alert('โหลดข้อมูลไม่สำเร็จ: '+e.message); });
</script>
</body>
</html>
